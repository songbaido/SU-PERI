<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>民办本科高校高质量发展情况查询</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --panel: #ffffff;
      --text: #172033;
      --muted: #667085;
      --line: #e6eaf0;
      --brand: #2563eb;
      --brand-dark: #1d4ed8;
      --soft: #eef4ff;
      --shadow: 0 12px 30px rgba(15, 23, 42, .08);
      --radius: 16px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 20% 0%, rgba(37, 99, 235, .10), transparent 28%),
        radial-gradient(circle at 100% 20%, rgba(14, 165, 233, .10), transparent 25%),
        var(--bg);
      min-height: 100vh;
    }

    .page {
      width: min(1200px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 48px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr;
      gap: 14px;
      margin-bottom: 22px;
    }

    .eyebrow {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      gap: 8px;
      border: 1px solid rgba(37, 99, 235, .20);
      background: rgba(255,255,255,.75);
      color: var(--brand-dark);
      border-radius: 999px;
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 700;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 44px);
      line-height: 1.12;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.7;
    }

    .toolbar {
      background: rgba(255, 255, 255, .88);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 18px;
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 14px;
      align-items: end;
      position: sticky;
      top: 0;
      z-index: 5;
      backdrop-filter: blur(12px);
    }

    .field {
      display: grid;
      gap: 7px;
    }

    .field label {
      color: #344054;
      font-size: 13px;
      font-weight: 700;
    }

    select,
    input {
      width: 100%;
      height: 42px;
      border: 1px solid #d0d7e2;
      border-radius: 12px;
      background: #fff;
      color: var(--text);
      padding: 0 12px;
      outline: none;
      font-size: 14px;
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    select:focus,
    input:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, .12);
    }

    .button {
      height: 42px;
      border: 0;
      border-radius: 12px;
      background: var(--brand);
      color: white;
      font-weight: 800;
      cursor: pointer;
      transition: transform .12s ease, background .12s ease;
    }

    .button:hover {
      background: var(--brand-dark);
    }

    .button:active {
      transform: translateY(1px);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin: 18px 0;
    }

    .stat {
      background: rgba(255,255,255,.84);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: 0 8px 22px rgba(15, 23, 42, .05);
      padding: 16px;
    }

    .stat .label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .stat .value {
      margin-top: 6px;
      font-size: 24px;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .card {
      background: rgba(255, 255, 255, .95);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .table-head {
      padding: 16px 18px;
      border-bottom: 1px solid var(--line);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .table-title {
      margin: 0;
      font-size: 18px;
      font-weight: 900;
    }

    .table-note {
      color: var(--muted);
      font-size: 13px;
    }

    .table-wrap {
      width: 100%;
      overflow: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 860px;
    }

    th {
      background: #f8fafc;
      color: #475467;
      border-bottom: 1px solid var(--line);
      padding: 13px 14px;
      text-align: left;
      white-space: nowrap;
      font-size: 13px;
      font-weight: 900;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    td {
      padding: 13px 14px;
      border-bottom: 1px solid #eef2f6;
      white-space: nowrap;
      font-size: 14px;
    }

    tbody tr:hover {
      background: #f9fbff;
    }

    .rank {
      display: inline-flex;
      min-width: 32px;
      height: 28px;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      background: var(--soft);
      color: var(--brand-dark);
      font-weight: 900;
    }

    .school {
      font-weight: 800;
      color: #111827;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 4px 9px;
      background: #f2f4f7;
      color: #344054;
      font-size: 12px;
      font-weight: 700;
    }

    .empty {
      padding: 40px 18px;
      text-align: center;
      color: var(--muted);
      font-weight: 700;
    }

    .hidden {
      display: none !important;
    }

    .remark {
      margin: 18px 0 34px;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, .75);
      color: var(--muted);
      font-size: 14px;
      line-height: 1.7;
    }

    @media (max-width: 920px) {
      .toolbar {
        grid-template-columns: 1fr 1fr;
        position: static;
      }

      .stats {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 560px) {
      .page {
        width: min(100% - 20px, 1200px);
        padding-top: 22px;
      }

      .toolbar,
      .stats {
        grid-template-columns: 1fr;
      }

      .table-head {
        align-items: flex-start;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="hero">
      <div class="eyebrow">民办本科高校高质量发展情况查询</div>
      <h1>苏湃（SU-PERI）2026年民办本科高校高质量发展评价</h1>
      <p class="subtitle">
        选择“整体排名”可查看按最终分数降序排列的全国前 50 强；选择具体省份后，可继续按整体情况、民办普通本科、独立学院、民办职业本科筛选。
      </p>
    </section>

    <section class="toolbar" aria-label="筛选条件">
      <div class="field">
        <label for="scopeSelect">查看范围</label>
        <select id="scopeSelect"></select>
      </div>

      <div class="field hidden" id="categoryField">
        <label for="categorySelect">省份分类</label>
        <select id="categorySelect">
          <option value="all">整体情况</option>
          <option value="privateRegular">民办普通本科</option>
          <option value="independent">独立学院</option>
          <option value="privateVocational">民办职业本科</option>
        </select>
      </div>

      <div class="field">
        <label for="keywordInput">关键词搜索</label>
        <input id="keywordInput" type="search" placeholder="搜索学校、地区、类型..." />
      </div>

      <button class="button" id="resetButton" type="button">重置筛选</button>
      <button class="button" id="exportButton" type="button">导出表格</button>
    </section>

    <section class="stats" aria-label="统计概览">
      <div class="stat">
        <div class="label">当前展示</div>
        <div class="value" id="shownCount">0</div>
      </div>
      <div class="stat">
        <div class="label">涉及省份</div>
        <div class="value" id="provinceCount">0</div>
      </div>
      <div class="stat">
        <div class="label">最高全国排名</div>
        <div class="value" id="bestRank">-</div>
      </div>
      <div class="stat">
        <div class="label">最高分学校</div>
        <div class="value" id="topSchool" style="font-size:18px; line-height:1.35;">-</div>
      </div>
    </section>

    <section class="card">
      <div class="table-head">
        <h2 class="table-title" id="tableTitle">整体排名 Top 50</h2>
        <div class="table-note" id="tableNote">按最终分数降序排列</div>
      </div>
      <div class="table-wrap" id="tableWrap"></div>
    </section>

    <section class="remark" aria-label="备注">
      备注：这只是初步情况，仅供参考，最终结果见苏州大学民办教育研究中心公众号发布的系列报告。
    </section>
  </main>

    }

    const natureLabelMap = {
      '民办': '民办普通本科',
      '独立学院': '独立学院',
      '民办职业本科': '民办职业本科'
    };

    function displayNature(value) {
      return natureLabelMap[value] || value || '未标注';
    }

    function compareScoreDesc(a, b) {
      if (b['最终分数'] !== a['最终分数']) return b['最终分数'] - a['最终分数'];
      return a['原始序号'] - b['原始序号'];
    }

    const allSchools = parseTSV(rawText);
    const nationalSorted = [...allSchools].sort(compareScoreDesc);

    nationalSorted.forEach((school, index) => {
      school.nationalRank = index + 1;
    });

    const byProvince = new Map();
    allSchools.forEach(school => {
      if (!byProvince.has(school['省份'])) byProvince.set(school['省份'], []);
      byProvince.get(school['省份']).push(school);
    });

    byProvince.forEach(list => {
      [...list].sort(compareScoreDesc).forEach((school, index) => {
        school.provinceRank = index + 1;
      });
    });

    const provinceOrder = [...byProvince.keys()];

    const scopeSelect = document.getElementById('scopeSelect');
    const categoryField = document.getElementById('categoryField');
    const categorySelect = document.getElementById('categorySelect');
    const keywordInput = document.getElementById('keywordInput');
    const resetButton = document.getElementById('resetButton');
    const exportButton = document.getElementById('exportButton');
    const tableWrap = document.getElementById('tableWrap');
    const tableTitle = document.getElementById('tableTitle');
    const tableNote = document.getElementById('tableNote');

    const shownCount = document.getElementById('shownCount');
    const provinceCount = document.getElementById('provinceCount');
    const bestRank = document.getElementById('bestRank');
    const topSchool = document.getElementById('topSchool');

    function initScopeOptions() {
      const options = [
        `<option value="overall">整体排名</option>`,
        ...provinceOrder.map(p => `<option value="${escapeAttr(p)}">${escapeHTML(p)}</option>`)
      ];
      scopeSelect.innerHTML = options.join('');
    }

    function escapeHTML(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    function escapeAttr(value) {
      return escapeHTML(value);
    }

    function normalizeText(value) {
      return String(value ?? '').toLowerCase().trim();
    }

    function filterByKeyword(list) {
      const keyword = normalizeText(keywordInput.value);
      if (!keyword) return list;

      return list.filter(school => {
        const haystack = [
          school['学校名称'],
          school['省份'],
          school['所在地区'],
          displayNature(school['学校性质']),
          school['办学类型'],
          school['区域'],
          school.nationalRank,
          school.provinceRank
        ].join(' ').toLowerCase();

        return haystack.includes(keyword);
      });
    }

    function getCategoryFiltered(list) {
      const category = categorySelect.value;

      if (category === 'all') return list;
      if (category === 'privateRegular') return list.filter(s => s['学校性质'] === '民办');
      if (category === 'independent') return list.filter(s => s['学校性质'] === '独立学院');
      if (category === 'privateVocational') return list.filter(s => s['学校性质'] === '民办职业本科');

      return list;
    }

    function getCurrentData() {
      const scope = scopeSelect.value;

      if (scope === 'overall') {
        categoryField.classList.add('hidden');
        const top50 = nationalSorted.slice(0, 50);
        return {
          mode: 'overall',
          list: filterByKeyword(top50),
          title: '整体排名 Top 50',
          note: '按最终分数降序排列，展示全国前 50 强'
        };
      }

      categoryField.classList.remove('hidden');

      const province = scope;
      const base = [...(byProvince.get(province) || [])].sort((a, b) => {
        if (a.provinceRank !== b.provinceRank) return a.provinceRank - b.provinceRank;
        return a.nationalRank - b.nationalRank;
      });

      const categoryName = categorySelect.options[categorySelect.selectedIndex]?.text || '整体情况';
      const filtered = filterByKeyword(getCategoryFiltered(base));

      return {
        mode: 'province',
        category: categorySelect.value,
        province,
        list: filtered,
        title: `${province}高校${categoryName}排名`,
        note: '省内排名按最终分数降序计算，排名 1 表示该省最高'
      };
    }

    function renderStats(list) {
      shownCount.textContent = list.length;
      provinceCount.textContent = new Set(list.map(s => s['省份'])).size || '-';

      if (!list.length) {
        bestRank.textContent = '-';
        topSchool.textContent = '-';
        return;
      }

      const best = [...list].sort((a, b) => a.nationalRank - b.nationalRank)[0];
      const top = [...list].sort(compareScoreDesc)[0];

      bestRank.textContent = best.nationalRank;
      topSchool.textContent = top['学校名称'];
    }

    function buildTableShape(context) {
      const isOverall = context.mode === 'overall';
      const isProvinceAll = context.mode === 'province' && context.category === 'all';

      if (isOverall) {
        return {
          headers: ['序号', '学校名称', '学校性质', '全国排名', '省份', '所在地区', '办学类型', '区域'],
          rows: context.list.map((school, index) => [
            index + 1,
            school['学校名称'],
            displayNature(school['学校性质']),
            school.nationalRank,
            school['省份'],
            school['所在地区'],
            school['办学类型'] || '未标注',
            school['区域']
          ])
        };
      }

      if (isProvinceAll) {
        return {
          headers: ['序号', '学校名称', '学校性质', '省内排名', '国内排名', '所在地区', '办学类型'],
          rows: context.list.map((school, index) => [
            index + 1,
            school['学校名称'],
            displayNature(school['学校性质']),
            school.provinceRank,
            school.nationalRank,
            school['所在地区'],
            school['办学类型'] || '未标注'
          ])
        };
      }

      return {
        headers: ['序号', '学校名称', '省内排名', '国内排名', '所在地区', '办学类型'],
        rows: context.list.map((school, index) => [
          index + 1,
          school['学校名称'],
          school.provinceRank,
          school.nationalRank,
          school['所在地区'],
          school['办学类型'] || '未标注'
        ])
      };
    }

    function formatCellForDisplay(header, value) {
      const safeValue = escapeHTML(value ?? '');
      if (header === '序号') return `<span class="rank">${safeValue}</span>`;
      if (header === '学校名称') return `<span class="school">${safeValue}</span>`;
      if (header === '学校性质') return `<span class="tag">${safeValue}</span>`;
      return safeValue;
    }

    function renderTable(context) {
      tableTitle.textContent = context.title;
      tableNote.textContent = context.note;
      renderStats(context.list);

      const shape = buildTableShape(context);

      if (!context.list.length) {
        tableWrap.innerHTML = `<div class="empty">暂无符合条件的数据</div>`;
        return;
      }

      const thead = `<thead><tr>${shape.headers.map(h => `<th>${escapeHTML(h)}</th>`).join('')}</tr></thead>`;
      const tbody = `<tbody>${shape.rows.map(row => `<tr>${row.map((cell, index) => `<td>${formatCellForDisplay(shape.headers[index], cell)}</td>`).join('')}</tr>`).join('')}</tbody>`;

      tableWrap.innerHTML = `<table>${thead}${tbody}</table>`;
    }

    let currentContext = null;

    function updateView() {
      currentContext = getCurrentData();
      renderTable(currentContext);
    }

    function sanitizeSheetName(value) {
      const cleaned = String(value || '当前表格')
        .replace(/[\\/*?:\[\]]/g, ' ')
        .replace(/\s+/g, ' ')
        .trim();
      return (cleaned || '当前表格').slice(0, 31);
    }

    function sanitizeFileName(value) {
      return String(value || '当前表格')
        .replace(/[\\/:*?"<>|]/g, '-')
        .replace(/\s+/g, ' ')
        .trim();
    }

    function getExportTitle() {
      let title = tableTitle.textContent.trim() || '当前表格';
      const keyword = keywordInput.value.trim();
      if (keyword) title += `（关键词：${keyword}）`;
      return title;
    }

    function escapeXML(value) {
      return String(value ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&apos;');
    }

    function columnName(index) {
      let name = '';
      let n = index + 1;
      while (n > 0) {
        const mod = (n - 1) % 26;
        name = String.fromCharCode(65 + mod) + name;
        n = Math.floor((n - 1) / 26);
      }
      return name;
    }

    function isNumericCell(value) {
      if (typeof value === 'number') return Number.isFinite(value);
      const text = String(value ?? '').trim();
      return /^-?\d+(\.\d+)?$/.test(text) && !/^0\d+/.test(text);
    }

    function worksheetXML(sheetTitle, note, headers, rows) {
      const allRows = [
        [sheetTitle],
        [note],
        [],
        headers,
        ...rows
      ];
      const rowXml = allRows.map((row, rowIndex) => {
        const excelRow = rowIndex + 1;
        const cells = row.map((value, colIndex) => {
          const ref = `${columnName(colIndex)}${excelRow}`;
          if (value === undefined || value === null || value === '') return `<c r="${ref}"/>`;
          if (isNumericCell(value)) return `<c r="${ref}"><v>${Number(value)}</v></c>`;
          return `<c r="${ref}" t="inlineStr"><is><t>${escapeXML(value)}</t></is></c>`;
        }).join('');
        return `<row r="${excelRow}">${cells}</row>`;
      }).join('');

      const lastCol = columnName(Math.max(headers.length - 1, 0));
      const mergeCells = headers.length > 1
        ? `<mergeCells count="2"><mergeCell ref="A1:${lastCol}1"/><mergeCell ref="A2:${lastCol}2"/></mergeCells>`
        : '';

      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
  <sheetViews><sheetView workbookViewId="0"/></sheetViews>
  <sheetFormatPr defaultRowHeight="18"/>
  <cols>${headers.map((header, index) => {
    const width = header === '学校名称' ? 28 : Math.max(12, String(header).length * 2 + 4);
    return `<col min="${index + 1}" max="${index + 1}" width="${width}" customWidth="1"/>`;
  }).join('')}</cols>
  <sheetData>${rowXml}</sheetData>
  ${mergeCells}
</worksheet>`;
    }

    function workbookXML(sheetName) {
      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships">
  <sheets><sheet name="${escapeXML(sheetName)}" sheetId="1" r:id="rId1"/></sheets>
</workbook>`;
    }

    function contentTypesXML() {
      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">
  <Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/>
  <Default Extension="xml" ContentType="application/xml"/>
  <Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>
  <Override PartName="/xl/worksheets/sheet1.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>
  <Override PartName="/docProps/core.xml" ContentType="application/vnd.openxmlformats-package.core-properties+xml"/>
  <Override PartName="/docProps/app.xml" ContentType="application/vnd.openxmlformats-officedocument.extended-properties+xml"/>
</Types>`;
    }

    function rootRelsXML() {
      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="xl/workbook.xml"/>
  <Relationship Id="rId2" Type="http://schemas.openxmlformats.org/package/2006/relationships/metadata/core-properties" Target="docProps/core.xml"/>
  <Relationship Id="rId3" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/extended-properties" Target="docProps/app.xml"/>
</Relationships>`;
    }

    function workbookRelsXML() {
      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">
  <Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/worksheet" Target="worksheets/sheet1.xml"/>
</Relationships>`;
    }

    function coreXML() {
      const now = new Date().toISOString();
      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<cp:coreProperties xmlns:cp="http://schemas.openxmlformats.org/package/2006/metadata/core-properties" xmlns:dc="http://purl.org/dc/elements/1.1/" xmlns:dcterms="http://purl.org/dc/terms/" xmlns:dcmitype="http://purl.org/dc/dcmitype/" xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance">
  <dc:title>民办本科高校高质量发展情况查询</dc:title>
  <dc:creator>苏湃（SU-PERI）</dc:creator>
  <cp:lastModifiedBy>苏湃（SU-PERI）</cp:lastModifiedBy>
  <dcterms:created xsi:type="dcterms:W3CDTF">${now}</dcterms:created>
  <dcterms:modified xsi:type="dcterms:W3CDTF">${now}</dcterms:modified>
</cp:coreProperties>`;
    }

    function appXML(sheetName) {
      return `<?xml version="1.0" encoding="UTF-8" standalone="yes"?>
<Properties xmlns="http://schemas.openxmlformats.org/officeDocument/2006/extended-properties" xmlns:vt="http://schemas.openxmlformats.org/officeDocument/2006/docPropsVTypes">
  <Application>民办本科高校高质量发展情况查询</Application>
  <TitlesOfParts><vt:vector size="1" baseType="lpstr"><vt:lpstr>${escapeXML(sheetName)}</vt:lpstr></vt:vector></TitlesOfParts>
</Properties>`;
    }

    const textEncoder = new TextEncoder();

    function bytesFromString(value) {
      return textEncoder.encode(value);
    }

    function uint16(value) {
      const bytes = new Uint8Array(2);
      new DataView(bytes.buffer).setUint16(0, value, true);
      return bytes;
    }

    function uint32(value) {
      const bytes = new Uint8Array(4);
      new DataView(bytes.buffer).setUint32(0, value >>> 0, true);
      return bytes;
    }

    function concatBytes(parts) {
      const total = parts.reduce((sum, part) => sum + part.length, 0);
      const output = new Uint8Array(total);
      let offset = 0;
      parts.forEach(part => {
        output.set(part, offset);
        offset += part.length;
      });
      return output;
    }

    const crcTable = (() => {
      const table = new Uint32Array(256);
      for (let i = 0; i < 256; i++) {
        let c = i;
        for (let k = 0; k < 8; k++) c = c & 1 ? 0xedb88320 ^ (c >>> 1) : c >>> 1;
        table[i] = c >>> 0;
      }
      return table;
    })();

    function crc32(bytes) {
      let crc = 0xffffffff;
      for (let i = 0; i < bytes.length; i++) crc = crcTable[(crc ^ bytes[i]) & 0xff] ^ (crc >>> 8);
      return (crc ^ 0xffffffff) >>> 0;
    }

    function createZip(files) {
      const localParts = [];
      const centralParts = [];
      let offset = 0;

      files.forEach(file => {
        const nameBytes = bytesFromString(file.name);
        const dataBytes = bytesFromString(file.content);
        const crc = crc32(dataBytes);

        const localHeader = concatBytes([
          uint32(0x04034b50), uint16(20), uint16(0), uint16(0), uint16(0), uint16(0),
          uint32(crc), uint32(dataBytes.length), uint32(dataBytes.length), uint16(nameBytes.length), uint16(0), nameBytes
        ]);
        localParts.push(localHeader, dataBytes);

        const centralHeader = concatBytes([
          uint32(0x02014b50), uint16(20), uint16(20), uint16(0), uint16(0), uint16(0), uint16(0),
          uint32(crc), uint32(dataBytes.length), uint32(dataBytes.length), uint16(nameBytes.length), uint16(0), uint16(0),
          uint16(0), uint16(0), uint32(0), uint32(offset), nameBytes
        ]);
        centralParts.push(centralHeader);
        offset += localHeader.length + dataBytes.length;
      });

      const centralDirectory = concatBytes(centralParts);
      const localData = concatBytes(localParts);
      const endRecord = concatBytes([
        uint32(0x06054b50), uint16(0), uint16(0), uint16(files.length), uint16(files.length),
        uint32(centralDirectory.length), uint32(localData.length), uint16(0)
      ]);

      return concatBytes([localData, centralDirectory, endRecord]);
    }

    function createXLSXBlob(title, note, headers, rows) {
      const sheetName = sanitizeSheetName(title);
      const files = [
        { name: '[Content_Types].xml', content: contentTypesXML() },
        { name: '_rels/.rels', content: rootRelsXML() },
        { name: 'xl/workbook.xml', content: workbookXML(sheetName) },
        { name: 'xl/_rels/workbook.xml.rels', content: workbookRelsXML() },
        { name: 'xl/worksheets/sheet1.xml', content: worksheetXML(title, note, headers, rows) },
        { name: 'docProps/core.xml', content: coreXML() },
        { name: 'docProps/app.xml', content: appXML(sheetName) }
      ];
      return new Blob([createZip(files)], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
    }

    function exportCurrentTable() {
      const context = currentContext || getCurrentData();
      const shape = buildTableShape(context);
      const exportTitle = getExportTitle();
      const exportNote = tableNote.textContent.trim() || context.note;
      const blob = createXLSXBlob(exportTitle, exportNote, shape.headers, shape.rows);
      const link = document.createElement('a');
      const fileTitle = sanitizeFileName(`民办本科高校高质量发展情况查询-${exportTitle}`);
      link.href = URL.createObjectURL(blob);
      link.download = `${fileTitle}.xlsx`;
      document.body.appendChild(link);
      link.click();
      link.remove();
      setTimeout(() => URL.revokeObjectURL(link.href), 1000);
    }

    resetButton.addEventListener('click', () => {
      scopeSelect.value = 'overall';
      categorySelect.value = 'all';
      keywordInput.value = '';
      updateView();
    });

    exportButton.addEventListener('click', exportCurrentTable);

    scopeSelect.addEventListener('change', updateView);
    categorySelect.addEventListener('change', updateView);
    keywordInput.addEventListener('input', updateView);

    initScopeOptions();
    updateView();
  </script>
</body>
</html>
